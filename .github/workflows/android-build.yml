name: Android Build
on:
  push:
    branches: [ "main" ] # Runs every time you push to the main branch

jobs:
  build:
    runs-on: ubuntu-latest # A fast, free Linux server
    steps:
      - uses: actions/checkout@v4 # Gets your code

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17' # Required for modern Flutter/Android

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk