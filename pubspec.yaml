name: okoskert_internal
description: "An internal app for Okoskert"
publish_to: 'none'
version: 0.6.0

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  firebase_core: ^4.2.1
  open_filex: ^4.7.0
